name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published, prereleased ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach APK to (e.g., 0.1)'
        required: false
      play-store-track:
        description: 'Upload AAB to Play Store track'
        type: choice
        options:
          - ''
          - internal
          - production
        default: ''
      draft-release:
        description: 'Create as draft (not published)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > app/google-services.json

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-1.13.4.aar

      - name: Build fdroid Release APK
        id: fdroid-apk
        # Firebase-free APK for F-Droid / GitHub Releases / sideloading.
        # No google-services.json or keystore needed (unsigned for F-Droid re-signing).
        run: ./gradlew assembleFdroidRelease

      - name: Build Release AAB
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "${{ secrets.KEYSTORE_PROPERTIES }}" > keystore.properties
          sed -i 's|storeFile=.*|storeFile=release.keystore|' keystore.properties
          ./gradlew bundlePlayStoreRelease

      - name: Extract release notes
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python3 scripts/extract-release-notes.py \
            --fallback "$RELEASE_BODY" \
            --output-dir whats-new

      - name: Upload fdroid Release APK artifact
        if: steps.fdroid-apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-fdroid-release
          path: app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk

      - name: Upload Release AAB artifact
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/playStoreRelease/app-playStore-release.aab
          if-no-files-found: error

      - name: Upload release notes artifact
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: whats-new/

      - name: Attach APKs to GitHub Release
        if: >-
          (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || '' }}
          files: |
            app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-play-store:
    name: Publish to Play Store
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
    needs: build
    environment: production

    steps:
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: whats-new

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.antivocale.app
          releaseFiles: app-playStore-release.aab
          track: ${{ github.event.inputs.play-store-track || 'internal' }}
          status: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.draft-release == 'true') && 'draft' || 'completed' }}
          whatsNewDirectory: whats-new

  # Produces the byte-reproducible reference APK for F-Droid's Binaries check.
  # Built inside F-Droid's own buildserver image (same toolchain/NDK as F-Droid CI),
  # proven reproducible: two independent F-Droid CI runs of this recipe yielded
  # byte-identical unsigned APKs. The output is signed with the project release
  # key and uploaded to the GitHub release as the Binaries reference APK.
  # Manual trigger only (run once per release after tagging).
  reproducible-fdroid:
    name: Build reproducible F-Droid reference APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    container:
      image: registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie
      options: --user root
    env:
      ANDROID_HOME: /opt/android-sdk

    steps:
      - name: Clone fdroiddata (recipe + srclib, from the GitLab fork)
        run: |
          git clone --depth 1 --branch anti-vocale-1.8.2 \
            https://gitlab.com/paoloantinori/fdroid-data.git fdroiddata

      - name: Install fdroidserver and NDK r27c
        run: |
          set -ex
          . /etc/profile.d/bsenv.sh || true
          export fdroidserver=/opt/fdroidserver
          rm -rf $fdroidserver && mkdir $fdroidserver
          curl --silent https://gitlab.com/fdroid/fdroidserver/-/archive/master/fdroidserver-master.tar.gz | \
            tar -xz --directory=$fdroidserver --strip-components=1
          export PATH="$fdroidserver:$PATH"
          export PYTHONPATH="$fdroidserver:$fdroidserver/examples"
          export PYTHONUNBUFFERED=true
          export serverwebroot=/tmp
          # F-Droid's image ships without an NDK; install r27c (the recipe's ndk:) where fdroid looks.
          yes | sdkmanager "ndk;27.2.12479018" || true
          # The recipe's sudo: deps (wget etc.) don't auto-install when running as root; install them.
          apt-get update -qq && apt-get install -y --no-install-recommends wget build-essential cmake g++ zip unzip
          fdroid --version || true

      - name: Build app via fdroid build (reproducible, from source)
        working-directory: fdroiddata
        env:
          PYTHONPATH: /opt/fdroidserver:/opt/fdroidserver/examples
          PYTHONUNBUFFERED: "true"
          serverwebroot: /tmp
        run: |
          set -ex
          . /etc/profile.d/bsenv.sh || true
          export PATH="/opt/fdroidserver:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:$PATH"
          fdroid build com.antivocale.app:29 --no-tarball
      - name: Debug - locate built APK
        if: always()
        run: |
          echo "=== all APKs under the workspace ==="
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || true
          echo "=== fdroiddata tree (unsigned/tmp/repo) ==="
          ls -la fdroiddata/unsigned fdroiddata/tmp fdroiddata/repo 2>/dev/null || true
          echo "=== full fdroiddata dir listing ==="
          ls -la fdroiddata 2>/dev/null || true

      - name: Sign the reference APK with the release key
        run: |
          set -ex
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "${{ secrets.KEYSTORE_PROPERTIES }}" > keystore.properties
          STORE_PASS=$(grep '^storePassword=' keystore.properties | cut -d= -f2-)
          KEY_PASS=$(grep '^keyPassword=' keystore.properties | cut -d= -f2-)
          ALIAS=$(grep '^keyAlias=' keystore.properties | cut -d= -f2-)
          # fdroid build leaves the APK in the gradle output dir (fdroid publish would move it to unsigned/).
          UNSIGNED=$(find . -path "*/apk/fdroid/release/*.apk" | head -1)
          test -n "$UNSIGNED"
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --in "$UNSIGNED" --out app-fdroid-release.apk
          apksigner verify --print-certs app-fdroid-release.apk | grep SHA-256

      - name: Attach signed reference APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: app-fdroid-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

