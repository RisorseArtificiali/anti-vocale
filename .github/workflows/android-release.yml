name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published, prereleased ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach APK to (e.g., 0.1)'
        required: false
      play-store-track:
        description: 'Upload AAB to Play Store track'
        type: choice
        options:
          - ''
          - internal
          - production
        default: ''
      draft-release:
        description: 'Create as draft (not published)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > app/google-services.json

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-1.13.4.aar

      - name: Build Debug APK
        id: debug-apk
        # Best-effort: the debug sideloading APK must not gate the production
        # Release AAB / Play publish. processDebugGoogleServices can fail here because
        # the debug applicationId (com.antivocale.app.debug) isn't in google-services.json.
        continue-on-error: true
        run: ./gradlew assembleDebug

      - name: Build Release AAB
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "${{ secrets.KEYSTORE_PROPERTIES }}" > keystore.properties
          sed -i 's|storeFile=.*|storeFile=release.keystore|' keystore.properties
          ./gradlew bundleRelease

      - name: Extract release notes
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python3 scripts/extract-release-notes.py \
            --fallback "$RELEASE_BODY" \
            --output-dir whats-new

      - name: Upload Debug APK artifact
        if: steps.debug-apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB artifact
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload release notes artifact
        if: >-
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: whats-new/

      - name: Attach APK to GitHub Release
        if: steps.debug-apk.outcome == 'success' && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || '' }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-play-store:
    name: Publish to Play Store
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.play-store-track != '')
    needs: build
    environment: production

    steps:
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: whats-new

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.antivocale.app
          releaseFiles: app-release.aab
          track: ${{ github.event.inputs.play-store-track || 'internal' }}
          status: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.draft-release == 'true') && 'draft' || 'completed' }}
          whatsNewDirectory: whats-new
