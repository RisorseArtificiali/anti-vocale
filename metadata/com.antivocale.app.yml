Summary: Offline voice-message transcription

Description: |
  Anti-Vocale transcribes voice messages from WhatsApp, Telegram, Signal, and other
  messaging apps directly on your Android device. All processing happens on-device —
  your audio never leaves your phone.

  No network connection, no cloud, no accounts, no tracking. AI models run locally
  via ONNX Runtime.

  Multiple swappable ASR backends: Parakeet TDT (25 European languages), Whisper
  Distil Italian, Whisper Turbo (99 languages), Qwen3-ASR (52 languages), Nemotron
  3.5 streaming (progressive text display), and Gemma 4 multimodal.

  Features: share-to-transcribe from any app, auto-copy to clipboard, auto-save
  transcripts to a folder, video file transcription, progressive display, per-app
  notification preferences, Tasker integration.

